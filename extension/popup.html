<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XHS Bridge</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --panel: #fffdf9;
        --text: #1d1813;
        --muted: #6f665b;
        --line: #ddd2c1;
        --accent: #c4552a;
        --accent-strong: #9f3e18;
        --ok: #2f8f52;
        --warn: #bf7b28;
        --err: #b33a2d;
      }

      body {
        width: 380px;
        margin: 0;
        font-family: "Avenir Next", "PingFang SC", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(196, 85, 42, 0.16), transparent 34%),
          linear-gradient(180deg, #faf6ef 0%, var(--bg) 100%);
        color: var(--text);
      }

      .wrap {
        padding: 18px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.05;
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.5;
        font-size: 13px;
      }

      .panel {
        margin-top: 16px;
        background: var(--panel);
        border: 1px solid rgba(111, 102, 91, 0.14);
        border-radius: 20px;
        box-shadow: 0 14px 40px rgba(72, 50, 30, 0.08);
        padding: 16px;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 700;
        background: rgba(111, 102, 91, 0.12);
        color: var(--text);
      }

      .status-chip::before {
        content: "";
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: currentColor;
      }

      .status-chip.connected {
        color: var(--ok);
        background: rgba(47, 143, 82, 0.12);
      }

      .status-chip.connecting,
      .status-chip.handshaking {
        color: var(--warn);
        background: rgba(191, 123, 40, 0.12);
      }

      .status-chip.error,
      .status-chip.disconnected {
        color: var(--err);
        background: rgba(179, 58, 45, 0.12);
      }

      .status-detail {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.5;
      }

      .field {
        margin-top: 14px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 700;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 13px;
        font-size: 14px;
        background: #fff;
      }

      input:focus {
        outline: 2px solid rgba(196, 85, 42, 0.16);
        border-color: var(--accent);
      }

      .session-card {
        margin-top: 14px;
        border-radius: 16px;
        border: 1px solid rgba(111, 102, 91, 0.16);
        background: #fffcf7;
        padding: 14px;
      }

      .session-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .session-title {
        font-size: 13px;
        font-weight: 700;
      }

      .session-note {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .session-value {
        margin-top: 10px;
        border-radius: 12px;
        background: #fff;
        border: 1px dashed rgba(111, 102, 91, 0.22);
        padding: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        word-break: break-all;
        min-height: 18px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .primary:hover {
        background: var(--accent-strong);
      }

      .secondary {
        background: rgba(111, 102, 91, 0.12);
        color: var(--text);
      }

      .status-line {
        margin-top: 12px;
        min-height: 18px;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>XHS Bridge</h1>
      <p>点击扩展图标即可配置连接，并查看当前浏览器绑定的 Session ID。</p>

      <div class="panel">
        <div class="status-row">
          <div class="status-chip" id="status-chip">未配置</div>
          <button class="secondary" id="reconnect-btn" type="button">重连</button>
        </div>
        <div class="status-detail" id="status-detail">请先填写 Bridge URL 和 Bridge Token。</div>

        <form id="settings-form">
          <div class="field">
            <label for="bridge-url">Bridge URL</label>
            <input id="bridge-url" name="bridge-url" type="url" placeholder="wss://bridge.example.com/ws" required />
          </div>

          <div class="field">
            <label for="bridge-token">Bridge Token</label>
            <input id="bridge-token" name="bridge-token" type="password" placeholder="必填" required />
          </div>

          <div class="session-card">
            <div class="session-head">
              <div class="session-title">Session ID</div>
              <button class="secondary" id="copy-session-btn" type="button">复制</button>
            </div>
            <div class="session-note">浏览器连接成功后由 bridge 自动分配。把这个值填到 OpenClaw 或 CLI 的 `--bridge-session-id`。</div>
            <div class="session-value" id="session-value">尚未获取</div>
          </div>

          <div class="actions">
            <button class="primary" type="submit">保存并连接</button>
          </div>
          <div class="status-line" id="form-status"></div>
        </form>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
